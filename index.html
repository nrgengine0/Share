<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Camera - Firebase Sender</title>
    <style>
        body { margin: 0; padding: 20px; background: #121212; color: #fff; font-family: sans-serif; text-align: center; }
        .setting-box { background: #222; padding: 15px; border-radius: 8px; max-width: 400px; margin: 15px auto; text-align: left; border: 1px solid #333; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #00ffcc; }
        select { width: 100%; padding: 10px; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; margin-bottom: 15px; font-size: 16px; }
        .btn { width: 100%; max-width: 400px; padding: 15px; font-size: 18px; font-weight: bold; background: #00ffcc; border: none; border-radius: 8px; cursor: pointer; color: #000; box-shadow: 0 4px 15px rgba(0,255,204,0.3); }
        #status { margin-top: 20px; color: #ffaa00; font-size: 15px; font-weight: bold; }
        video { width: 100%; max-width: 400px; border-radius: 12px; margin-top: 20px; transform: scaleX(-1); border: 3px solid #333; }
    </style>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtkK8QrsdAlT87VDZN4TNILGGYWyI5T6o",
            authDomain: "vor-solo.firebaseapp.com",
            databaseURL: "https://vor-solo-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "vor-solo",
            storageBucket: "vor-solo.firebasestorage.app",
            messagingSenderId: "856896766437",
            appId: "1:856896766437:web:3431fc6596d95aa0e8ef0c",
            measurementId: "G-0PYHWM5Y4P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let peerConnection;
        let localStream;
        const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };

        window.startCamera = async function() {
            // အရင် Stream ရှိရင် ပိတ်ပစ်ရန်
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }

            const resolution = document.getElementById('resolution').value;
            const fps = parseInt(document.getElementById('fps').value);
            
            let width = 1280, height = 720;
            if (resolution === '1080p') { width = 1920; height = 1080; }

            document.getElementById('status').innerText = `ကင်မရာကို ${resolution} (${fps}fps) ဖြင့် ဖွင့်နေပါသည်...`;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user", 
                        width: { exact: width }, 
                        height: { exact: height },
                        frameRate: { ideal: fps, max: fps }
                    }, 
                    audio: false 
                });
                
                localStream = stream;
                document.getElementById('localVideo').srcObject = stream;

                peerConnection = new RTCPeerConnection(configuration);
                stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));

                peerConnection.onicecandidate = event => {
                    if (event.candidate) {
                        const candidateRef = ref(db, `stream/candidates/${Math.random().toString(36).substr(2, 9)}`);
                        set(candidateRef, JSON.stringify(event.candidate));
                    }
                };

                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                // ဒေတာအဟောင်းများ ရှိခဲ့ရင် အရင်ရှင်းထုတ်ရန်
                await set(ref(db, 'stream'), null);
                
                // ဆာဗာပေါ်သို့ Signal အသစ်တင်ရန်
                await set(ref(db, 'stream/offer'), JSON.stringify({ type: 'offer', sdp: offer.sdp }));
                document.getElementById('status').innerText = "🟢 ဖုန်းဘက်မှ အသင့်ဖြစ်ပါပြီ။ OBS ဘက်တွင် 'ချိတ်ဆက်မည်' ခလုတ်ကို နှိပ်ပေးပါ။";

                onValue(ref(db, 'stream/answer'), async (snapshot) => {
                    const data = snapshot.val();
                    if (data && peerConnection.signalingState !== "stable") {
                        const answer = JSON.parse(data);
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                        document.getElementById('status').innerText = "🟢 OBS နှင့် ချိတ်ဆက်မှု အောင်မြင်သွားပါပြီ!";
                    }
                });

                onDisconnect(ref(db, 'stream')).remove();

            } catch (err) {
                document.getElementById('status').innerText = "Error: သင့်ဖုန်း ကင်မရာသည် ၎င်းတင်ပြထားသော Resolution/FPS ကို Support မလုပ်ပါ (သို့မဟုတ်) ခွင့်ပြုချက်မရပါ။";
                console.error(err);
            }
        }
    </script>
</head>
<body>
    <h1>📱 PHONE STREAM SETTING</h1>
    
    <div class="setting-box">
        <label for="resolution">Resolution ရွေးချယ်ပါ:</label>
        <select id="resolution">
            <option value="720p">720p (HD)</option>
            <option value="1080p">1080p (Full HD)</option>
        </select>

        <label for="fps">Frame Rate (FPS):</label>
        <select id="fps">
            <option value="30">30 FPS</option>
            <option value="60">60 FPS</option>
        </select>
    </div>

    <button class="btn" onclick="startCamera()">ကင်မရာ စတင်ဖွင့်မည်</button>
    <div id="status">Setting ရွေးချယ်ပြီး ခလုတ်ကို နှိပ်ပါ...</div>
    <video id="localVideo" autoplay playsinline muted></video>
</body>
</html>
