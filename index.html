<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Camera - Firebase Advanced Controller</title>
    <style>
        body { margin: 0; padding: 20px; background: #121212; color: #fff; font-family: sans-serif; text-align: center; }
        .btn { padding: 15px 30px; font-size: 16px; font-weight: bold; background: #00ffcc; border: none; border-radius: 8px; cursor: pointer; color: #000; box-shadow: 0 4px 15px rgba(0,255,204,0.3); margin: 5px; }
        #status { margin-top: 15px; color: #ffaa00; font-size: 15px; }
        
        /* 👥 OBS List Area */
        .list-box { background: #1e1e1e; padding: 15px; border-radius: 12px; max-width: 400px; margin: 20px auto; border: 1px solid #333; text-align: left; }
        .list-title { font-weight: bold; color: #00ffcc; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .obs-item { display: flex; justify-content: space-between; align-items: center; background: #2a2a2a; padding: 8px 12px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #444; }
        .obs-id { font-family: monospace; font-size: 14px; color: #fff; }
        .btn-kick { background: #ff3333; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-kick:hover { background: #cc0000; }
        
        /* 🎛️ Layout Slider Styling */
        .control-box { background: #1e1e1e; padding: 20px; border-radius: 12px; max-width: 400px; margin: 20px auto; text-align: left; border: 1px solid #333; }
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; margin-bottom: 5px; color: #00ffcc; font-weight: bold; }
        .control-group input { width: 100%; accent-color: #00ffcc; }
        video { width: 100%; max-width: 400px; border-radius: 12px; margin-top: 20px; transform: scaleX(-1); border: 3px solid #333; }
    </style>
</head>
<body>

    <h1>📱 PHONE STREAM & INDIVIDUAL CONTROLLER</h1>
    
    <div>
        <button class="btn" id="startBtn">ကင်မရာ စဖွင့်မည်</button>
    </div>

    <div id="status">ခလုတ်ကို နှိပ်ပါ...</div>

    <!-- 👥 လာရောက် Join ထားသော OBS စာရင်းများကို ပြသရန် နေရာ -->
    <div class="list-box">
        <div class="list-title">👥 ချိတ်ဆက်ထားသော OBS များ (<span id="totalConnections">0</span>)</div>
        <div id="obsList">
            <div style="color:#777; text-align:center; font-size:14px;">ချိတ်ဆက်မှု မရှိသေးပါ</div>
        </div>
    </div>

    <!-- 🎛️ Layout ထိန်းချုပ်ရန် Sliders များ -->
    <div class="control-box">
        <div class="control-group">
            <label>အပေါ် / အောက် (Top Position)</label>
            <input type="range" id="topSlider" min="0" max="900" value="30">
        </div>
        <div class="control-group">
            <label>ဘယ် / ညာ (Left Position)</label>
            <input type="range" id="leftSlider" min="0" max="1600" value="30">
        </div>
        <div class="control-group">
            <label>အရွယ်အစား (Camera Size/Width)</label>
            <input type="range" id="sizeSlider" min="150" max="1000" value="400">
        </div>
    </div>

    <video id="localVideo" autoplay playsinline muted></video>

    <!-- Firebase SDK Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtkK8QrsdAlT87VDZN4TNILGGYWyI5T6o",
            authDomain: "vor-solo.firebaseapp.com",
            databaseURL: "https://vor-solo-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "vor-solo",
            storageBucket: "vor-solo.firebasestorage.app",
            messagingSenderId: "856896766437",
            appId: "1:856896766437:web:3431fc6596d95aa0e8ef0c",
            measurementId: "G-0PYHWM5Y4P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const signalRef = ref(db, 'stream/signal');
        const layoutRef = ref(db, 'stream/layout');
        const connectionsRef = ref(db, 'stream/connections');

        let peerConnection;
        const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        // --- 👥 OBS List များကို Real-time ဖမ်းပြီး List ဆောက်ပေးခြင်း ---
        onValue(connectionsRef, (snapshot) => {
            const data = snapshot.val();
            const obsListDiv = document.getElementById('obsList');
            const totalCountSpan = document.getElementById('totalConnections');
            
            obsListDiv.innerHTML = ""; // list အဟောင်းကို အရင်ရှင်းသည်
            
            if (data) {
                const keys = Object.keys(data);
                totalCountSpan.innerText = keys.length;
                
                keys.forEach((id, index) => {
                    const item = document.createElement('div');
                    item.className = "obs-item";
                    item.innerHTML = `
                        <span class="obs-id">🖥️ OBS Screen #${index + 1} (${id})</span>
                        <button class="btn-kick" data-id="${id}">ဖြတ်မည် (Kick)</button>
                    `;
                    obsListDiv.appendChild(item);
                });

                // Kick ခလုတ်များအတွက် Event ပတ်ခြင်း
                document.querySelectorAll('.btn-kick').forEach(button => {
                    button.addEventListener('click', function() {
                        const targetId = this.getAttribute('data-id');
                        kickOBS(targetId);
                    });
                });
            } else {
                totalCountSpan.innerText = "0";
                obsListDiv.innerHTML = `<div style="color:#777; text-align:center; font-size:14px;">ချိတ်ဆက်မှု မရှိသေးပါ</div>`;
            }
        });

        // --- ❌ ရွေးချယ်လိုက်သော OBS ID တစ်ခုတည်းကို ဖြတ်ချပစ်မည့် Function ---
        async function kickOBS(id) {
            document.getElementById('status').innerText = `⚠️ OBS (${id}) ကို ဖြတ်တောက်နေပါသည်...`;
            // ၎င်း OBS ရဲ့ Database အောက်က Status ကို ပယ်ဖျက်လိုက်ခြင်းဖြင့် Kick ထုတ်သည်
            await remove(ref(db, `stream/connections/${id}`));
            document.getElementById('status').innerText = `🟢 OBS (${id}) ကို ဖြတ်တောက်ပြီးပါပြီ။`;
        }

        function sendLayoutUpdate() {
            const topVal = document.getElementById('topSlider').value;
            const leftVal = document.getElementById('leftSlider').value;
            const sizeVal = document.getElementById('sizeSlider').value;

            set(layoutRef, {
                top: topVal + "px",
                left: leftVal + "px",
                width: sizeVal + "px"
            });
        }

        document.getElementById('topSlider').addEventListener('input', sendLayoutUpdate);
        document.getElementById('leftSlider').addEventListener('input', sendLayoutUpdate);
        document.getElementById('sizeSlider').addEventListener('input', sendLayoutUpdate);

        window.startCamera = async function() {
            document.getElementById('status').innerText = "ကင်မရာ ဖွင့်နေပါသည်...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 1280, height: 720 }, 
                    audio: false 
                });
                document.getElementById('localVideo').srcObject = stream;

                peerConnection = new RTCPeerConnection(configuration);
                stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));

                peerConnection.onicecandidate = event => {
                    if (event.candidate) {
                        set(ref(db, 'stream/candidate'), JSON.stringify(event.candidate));
                    }
                };

                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                await set(signalRef, JSON.stringify({ type: 'offer', sdp: offer.sdp }));
                document.getElementById('status').innerText = "🟢 ဗီဒီယိုလွှင့်နေပါပြီ။ OBS ဘက်တွင် အလိုအလျောက် ပေါ်လာပါလိမ့်မည်။";

                onValue(ref(db, 'stream/answer'), async (snapshot) => {
                    const data = snapshot.val();
                    if (data && peerConnection.signalingState !== "stable") {
                        const answer = JSON.parse(data);
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                        sendLayoutUpdate();
                    }
                });

                onDisconnect(ref(db, 'stream')).remove();

            } catch (err) {
                document.getElementById('status').innerText = "Error: " + err.message;
            }
        }

        document.getElementById('startBtn').addEventListener('click', startCamera);
    </script>
</body>
</html>
