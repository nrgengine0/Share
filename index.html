<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Camera - Persistent Connection with Quality Control</title>
    <style>
        body { margin: 0; padding: 20px; background: #121212; color: #fff; font-family: sans-serif; text-align: center; }
        .btn { padding: 15px 30px; font-size: 16px; font-weight: bold; background: #00ffcc; border: none; border-radius: 8px; cursor: pointer; color: #000; box-shadow: 0 4px 15px rgba(0,255,204,0.3); margin: 5px; }
        #status { margin-top: 15px; color: #ffaa00; font-size: 15px; }
        
        .list-box { background: #1e1e1e; padding: 15px; border-radius: 12px; max-width: 400px; margin: 20px auto; border: 1px solid #333; text-align: left; }
        .list-title { font-weight: bold; color: #00ffcc; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .obs-item { display: flex; justify-content: space-between; align-items: center; background: #2a2a2a; padding: 8px 12px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #444; }
        .obs-id { font-family: monospace; font-size: 14px; color: #fff; }
        
        .control-box { background: #1e1e1e; padding: 20px; border-radius: 12px; max-width: 400px; margin: 20px auto; text-align: left; border: 1px solid #333; }
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; margin-bottom: 5px; color: #00ffcc; font-weight: bold; }
        .control-group input, .control-group select { width: 100%; accent-color: #00ffcc; background: #2a2a2a; color: white; border: 1px solid #444; padding: 8px; border-radius: 6px; }
        
        .video-container { position: relative; max-width: 400px; margin: 20px auto; }
        video { width: 100%; border-radius: 12px; transform: scaleX(-1); border: 3px solid #333; }
        .pip-btn { position: absolute; bottom: 15px; right: 15px; background: #00ffcc; color: #000; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; display: none; box-shadow: 0 4px 10px rgba(0,255,204,0.4); }
    </style>
</head>
<body>

    <h1>📱 iOS LIVE STREAM OVERLAY CONTROLLER</h1>
    <div>
        <button class="btn" id="startBtn">ကင်မရာ စဖွင့်မည်</button>
    </div>
    <div id="status">ခလုတ်ကို နှိပ်ပါ...</div>

    <div class="list-box">
        <div class="list-title">👥 ချိတ်ဆက်မှု အခြေအနေ</div>
        <div id="obsList"><div style="color:#00ffcc; text-align:center; font-size:14px;">StreamChamp Direct Mode Active</div></div>
    </div>

    <!-- ⚙️ Quality Settings Box -->
    <div class="control-box">
        <div class="list-title" style="border:none;">⚙️ CAMERA QUALITY SETTINGS</div>
        <div class="control-group">
            <label>အချိုးအစား (Aspect Ratio)</label>
            <select id="ratioSelect">
                <option value="1:1" selected>1:1 (Square)</option>
                <option value="16:9">16:9 (Landscape)</option>
                <option value="9:16">9:16 (Portrait)</option>
            </select>
        </div>
        <div class="control-group">
            <label>ကြည်လင်ပြတ်သားမှု (Resolution)</label>
            <select id="resSelect">
                <option value="720p" selected>720p (HD)</option>
                <option value="1080p">1080p (Full HD)</option>
            </select>
        </div>
        <div class="control-group">
            <label>ဖရိမ်နှုန်း (Frame Rate)</label>
            <select id="fpsSelect">
                <option value="30" selected>30 FPS</option>
                <option value="60">60 FPS</option>
            </select>
        </div>
    </div>

    <div class="control-box">
        <div class="list-title" style="border:none;">📐 LAYOUT CONTROLS</div>
        <div class="control-group">
            <label>အပေါ် / အောက် (Top Position)</label>
            <input type="range" id="topSlider" min="0" max="900" value="30">
        </div>
        <div class="control-group">
            <label>ဘယ် / ညာ (Left Position)</label>
            <input type="range" id="leftSlider" min="0" max="1600" value="30">
        </div>
        <div class="control-group">
            <label>အရွယ်အစား (Camera Size/Width)</label>
            <input type="range" id="sizeSlider" min="150" max="1000" value="400">
        </div>
    </div>

    <div class="video-container">
        <video id="localVideo" autoplay playsinline webkit-playsinline muted loops></video>
        <button class="pip-btn" id="pipBtn">📲 Background Live Active ဖွင့်မည်</button>
    </div>

    <!-- Hidden Canvas for Image Streaming -->
    <canvas id="captureCanvas" style="display:none;"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtkK8QrsdAlT87VDZN4TNILGGYWyI5T6o",
            authDomain: "vor-solo.firebaseapp.com",
            databaseURL: "https://vor-solo-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "vor-solo",
            storageBucket: "vor-solo.firebasestorage.app",
            messagingSenderId: "856896766437",
            appId: "1:856896766437:web:3431fc6596d95aa0e8ef0c",
            measurementId: "G-0PYHWM5Y4P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const layoutRef = ref(db, 'stream/layout');
        const imageRef = ref(db, 'stream/imageFrame');

        let localStream;
        const localVideo = document.getElementById('localVideo');
        const pipBtn = document.getElementById('pipBtn');
        const canvas = document.getElementById('captureCanvas');
        const ctx = canvas.getContext('2d');
        let streamInterval;

        if (localVideo.webkitSupportsPresentationMode && typeof localVideo.webkitSetPresentationMode === "function") {
            pipBtn.style.display = 'block';
            pipBtn.addEventListener('click', () => {
                localVideo.webkitSetPresentationMode(localVideo.webkitPresentationMode === "picture-in-picture" ? "inline" : "picture-in-picture");
            });
        }

        function sendLayoutUpdate() {
            set(layoutRef, {
                top: document.getElementById('topSlider').value + "px",
                left: document.getElementById('leftSlider').value + "px",
                width: document.getElementById('sizeSlider').value + "px",
                ratio: document.getElementById('ratioSelect').value
            });
        }

        document.getElementById('topSlider').addEventListener('input', sendLayoutUpdate);
        document.getElementById('leftSlider').addEventListener('input', sendLayoutUpdate);
        document.getElementById('sizeSlider').addEventListener('input', sendLayoutUpdate);
        document.getElementById('ratioSelect').addEventListener('change', sendLayoutUpdate);

        async function applyQualityChanges() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                clearInterval(streamInterval);
                await startCamera();
            }
        }

        document.getElementById('resSelect').addEventListener('change', applyQualityChanges);
        document.getElementById('fpsSelect').addEventListener('change', applyQualityChanges);

        window.startCamera = async function() {
            document.getElementById('status').innerText = "ကင်မရာ ဖွင့်နေပါသည်...";
            
            const resMode = document.getElementById('resSelect').value;
            const fpsMode = parseInt(document.getElementById('fpsSelect').value);
            
            // StreamChamp HTML တွင် သွက်လက်မြန်ဆန်ပြီး Data မများစေရန် optimal size သုံးသည်
            const targetWidth = resMode === "1080p" ? 960 : 640;
            const targetHeight = resMode === "1080p" ? 540 : 480;

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: targetWidth, height: targetHeight, frameRate: fpsMode }, 
                    audio: false 
                });
                
                localVideo.srcObject = localStream;
                document.getElementById('status').innerText = "🟢 StreamChamp Direct Mode Active!";
                sendLayoutUpdate();

                // Firebase ထံသို့ ပုံရိပ်များ တိုက်ရိုက် ပို့ပေးမည့် Loop
                canvas.width = targetWidth;
                canvas.height = targetHeight;
                
                const intervalMs = Math.round(1000 / fpsMode);
                streamInterval = setInterval(() => {
                    if (localVideo.readyState === localVideo.HAVE_ENOUGH_DATA) {
                        // ကင်မရာ Mirror ဖြစ်အောင် Canvas တွင်လှည့်ဆွဲခြင်း
                        ctx.save();
                        ctx.translate(canvas.width, 0);
                        ctx.scale(-1, 1);
                        ctx.drawImage(localVideo, 0, 0, canvas.width, canvas.height);
                        ctx.restore();
                        
                        // JPEG compression ဖြင့် Size လျှော့ချပြီး Firebase သို့ တင်ခြင်း
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.4); 
                        set(imageRef, dataUrl);
                    }
                }, intervalMs);

            } catch (err) {
                document.getElementById('status').innerText = "Error: " + err.message;
            }
        }
        document.getElementById('startBtn').addEventListener('click', startCamera);
    </script>
</body>
</html>
